version: "3.8"

services:
  incident-triage-mcp:
    build: .
    container_name: incident-triage-studio
    ports:
      - "4100:4100"
    environment:
      - PORT=4100
      - HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:4100/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - archestra-network

networks:
  archestra-network:
    external: true
    name: archestra-network
